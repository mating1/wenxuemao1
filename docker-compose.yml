version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: eduagent-backend
    env_file:
      - backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/eduagent.db
      - CHROMA_PERSIST_DIR=./data/chroma
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: eduagent-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
